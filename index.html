<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>N&H Veggie Store</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
    }

    h1 {
      background: green;
      color: white;
      padding: 15px;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 200px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    button {
      padding: 8px 12px;
      background: orange;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 5px;
      margin: 3px;
    }

    button:hover {
      background: darkorange;
    }

    #cart {
      margin-top: 30px;
      background: white;
      padding: 20px;
      width: 50%;
      margin-left: auto;
      margin-right: auto;
      border-radius: 10px;
    }

    .qty-btn {
      background: blue;
    }
  </style>
</head>
<body>

<h1>🛒 Veggie Store</h1>

<div class="container">
  <div class="card">
    <h3>🧅 Onion</h3>
    <p>₹ 17/ kg</p>
    <button onclick="addItem('Onion', 17)">Add</button>
  </div>

  <div class="card">
    <h3>🥔 Potato</h3>
    <p>₹25 / kg</p>
    <button onclick="addItem('Potato', 25)">Add</button>
  </div>

  <div class="card">
    <h3>🧄 Garlic</h3>
    <p>₹100 / kg</p>
    <button onclick="addItem('Garlic', 100)">Add</button>
  </div>
</div>

<div id="cart">
  <h2>🧾 Cart</h2>
  <div id="cartItems"></div>
  <h3>Total: ₹<span id="total">0</span></h3>
  <button onclick="checkout()">Checkout</button>
</div>

<script>
let cart = {};

function addItem(name, price) {
  if (!cart[name]) {
    cart[name] = { price: price, qty: 1 };
  } else {
    cart[name].qty++;
  }
  renderCart();
}

function increase(name) {
  cart[name].qty++;
  renderCart();
}

function decrease(name) {
  cart[name].qty--;
  if (cart[name].qty <= 0) {
    delete cart[name];
  }
  renderCart();
}

function renderCart() {
  let cartDiv = document.getElementById("cartItems");
  cartDiv.innerHTML = "";
  let total = 0;

  for (let item in cart) {
    let data = cart[item];
    total += data.price * data.qty;

    cartDiv.innerHTML += `
      <p>
        ${item} - ₹${data.price} × ${data.qty}
        <button class="qty-btn" onclick="increase('${item}')">+</button>
        <button class="qty-btn" onclick="decrease('${item}')">-</button>
      </p>
    `;
  }

  document.getElementById("total").textContent = total;
}

function checkout() {
  if (Object.keys(cart).length === 0) {
    alert("Cart is empty!");
  } else {
    alert("Order placed successfully!");
    cart = {};
    renderCart();
  }
}
</script>

</body>
</html>
